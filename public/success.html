<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement confirme — ShopFiche</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#fafaf8;color:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:white;border:1px solid #e2e2e0;border-radius:20px;padding:3rem;max-width:500px;width:100%;text-align:center}
.icon{width:64px;height:64px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.8rem}
h1{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:0.5rem}
h1 span{color:#16a34a}
p{color:#6b6b6b;line-height:1.6;margin-bottom:1.5rem}
.btn{display:inline-block;padding:0.9rem 2rem;background:#1a5cff;color:white;border-radius:10px;font-weight:600;text-decoration:none;font-size:1rem}
.features{margin:1.5rem 0;text-align:left;background:#fafaf8;border-radius:12px;padding:1.2rem}
.feature{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.6rem;font-size:0.9rem}
.feature:last-child{margin-bottom:0}
.check{color:#16a34a;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Bienvenue sur <span>ShopFiche</span> !</h1>
  <p>Votre abonnement est actif. Vous avez maintenant acces a toutes les fonctionnalites ShopFiche.</p>
  <div class="features">
    <div class="feature"><span class="check">✓</span> Fiches produits illimitees</div>
    <div class="feature"><span class="check">✓</span> Import CSV en masse</div>
    <div class="feature"><span class="check">✓</span> Export au format Shopify</div>
    <div class="feature"><span class="check">✓</span> 5 langues disponibles</div>
    <div class="feature"><span class="check">✓</span> Score SEO sur chaque fiche</div>
  </div>
  <a href="/generator.html" class="btn">Commencer a generer mes fiches</a>
</div>
</body>
</html>
